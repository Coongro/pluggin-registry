name: Update Plugin Catalog

on:
  # Triggered by plugin repos after publish
  repository_dispatch:
    types: [plugin-updated]

  # Manual trigger
  workflow_dispatch:
    inputs:
      plugin_repo:
        description: 'Plugin repo to update (e.g., Coongro/kit-veterinary). Leave empty for full regeneration.'
        required: false
        type: string

  # Daily backup regeneration
  schedule:
    - cron: '0 6 * * *'  # 6 AM UTC daily

jobs:
  update-catalog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout registry
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install yaml

      - name: Update single plugin (from dispatch)
        if: github.event_name == 'repository_dispatch'
        run: |
          echo "Updating plugin from: ${{ github.event.client_payload.plugin_repo }}"
          node scripts/update-single.js "${{ github.event.client_payload.plugin_repo }}"

      - name: Update single plugin (from manual input)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.plugin_repo != ''
        run: |
          echo "Updating plugin from: ${{ github.event.inputs.plugin_repo }}"
          node scripts/update-single.js "${{ github.event.inputs.plugin_repo }}"

      - name: Full regeneration (scheduled or manual without input)
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.plugin_repo == '')
        run: |
          echo "Regenerating full catalog..."
          node scripts/regenerate-all.js

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add plugins-catalog.yaml

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update plugins catalog"
            git push
          fi
