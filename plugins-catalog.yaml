# Coongro Plugin Registry
# Catálogo centralizado de plugins disponibles
# Última actualización: 2026-02-27

version: "1.0.0"
lastUpdated: "2026-02-27T00:00:00Z"

plugins:
  # ==========================================================================
  # KITS (meta-plugins que agrupan otros plugins)
  # ==========================================================================
  - id: "kit-veterinary"
    name: "@coongro/kit-veterinary"
    version: "0.1.2"
    repo: "Coongro/kit-veterinary"
    description: "Kit base para gestión veterinaria. Incluye pacientes, consultas, productos y contactos."
    type: "kit"
    color: "#6366F1"

    entities: []

    views:
      - id: "kit-veterinary.dashboard.open"
        title: "Dashboard"
        type: "dashboard"
        acceptsContributions: true
        slots: ["sections", "actions"]

    repositories: []

    dependencies:
      - "@coongro/consultations"
      - "@coongro/patients"

    settings: []

  # ==========================================================================
  # BLOQUES (plugins con UI completa)
  # ==========================================================================
  - id: "consultations"
    name: "@coongro/consultations"
    version: "0.1.3"
    repo: "Coongro/consultations"
    description: "Bloque de historia clínica: consultas veterinarias, diagnósticos y tratamientos"
    type: "bloque"
    color: "#8B5CF6"

    entities:
      - name: "consultation"
        table: "module_consultations_consultations"
        displayName: "Consultas"
        fields:
          - { name: "pet_id", type: "text", required: true, refEntity: "patients.pet" }
          - { name: "vet_name", type: "text", required: true }
          - { name: "date", type: "datetime", required: true }
          - { name: "weight_kg", type: "number", required: false }
          - { name: "temperature", type: "number", required: false }
          - { name: "reason", type: "text", required: true }
          - { name: "reason_category", type: "text", required: false }
          - { name: "anamnesis", type: "text", required: false }
          - { name: "physical_exam", type: "text", required: false }
          - { name: "diagnosis", type: "text", required: false }
          - { name: "diagnosis_tags", type: "json", required: false }
          - { name: "treatment", type: "text", required: false }
          - { name: "follow_up_date", type: "text", required: false }
          - { name: "follow_up_notes", type: "text", required: false }
          - { name: "notes", type: "text", required: false }

      - name: "consultation-medication"
        table: "module_consultations_medications"
        displayName: "Medicamentos de Consulta"

      - name: "consultation-service"
        table: "module_consultations_services"
        displayName: "Servicios de Consulta"

    views:
      - id: "consultations.list.open"
        title: "Historial de Consultas"
        type: "list"
        entity: "consultation"
        acceptsContributions: true
        slots: ["sections", "actions"]

      - id: "consultations.detail.open"
        title: "Detalle Consulta"
        type: "detail"
        entity: "consultation"
        acceptsContributions: true
        slots: ["sections", "actions"]

      - id: "consultations.form.open"
        title: "Formulario Consulta"
        type: "form"
        entity: "consultation"
        acceptsContributions: true
        slots: ["sections", "actions"]

      - id: "consultations.services.open"
        title: "Servicios y Precios"
        type: "list"
        entity: "consultation-service"
        acceptsContributions: true
        slots: ["sections", "actions"]

    repositories:
      - prefix: "consultations.records"
        entity: "consultation"
        methods: ["list", "getById", "create", "update", "delete"]
      - prefix: "consultations.medications"
        entity: "consultation-medication"
        methods: ["list", "getById", "create", "update", "delete"]
      - prefix: "consultations.services"
        entity: "consultation-service"
        methods: ["list", "getById", "create", "update", "delete"]

    viewOverrides:
      - targetViewId: "patients.detail.open"
        title: "Ficha Paciente"
        description: "Extiende la ficha del paciente con historial de consultas"

    dependencies:
      - "@coongro/patients"
      - "@coongro/products"

    settings:
      - key: "consultations.reasonCategories"
        type: "boolean"
        label: "Categorías de motivo"
        description: "Habilitar botones de categoría rápida (rutina, vacunación, enfermedad, etc.)"
        default: true
      - key: "consultations.defaultVet"
        type: "string"
        label: "Veterinario predeterminado"
        default: ""
      - key: "consultations.showPrices"
        type: "boolean"
        label: "Servicios y precios en consultas"
        default: true

  - id: "patients"
    name: "@coongro/patients"
    version: "0.2.0"
    repo: "Coongro/patients"
    description: "Bloque de gestión de pacientes veterinarios: mascotas, dueños y fichas clínicas"
    type: "bloque"
    color: "#10B981"

    entities:
      - name: "pet"
        table: "module_patients_pets"
        displayName: "Mascotas"
        fields:
          - { name: "name", type: "text", required: true }
          - { name: "species", type: "text", required: true }
          - { name: "breed", type: "text", required: false }
          - { name: "sex", type: "text", required: false }
          - { name: "color_markings", type: "text", required: false }
          - { name: "birth_date", type: "text", required: false }
          - { name: "weight_kg", type: "number", required: false }
          - { name: "microchip_number", type: "text", required: false }
          - { name: "owner_id", type: "text", required: true, refEntity: "contacts.contact" }
          - { name: "photo_url", type: "text", required: false }
          - { name: "status", type: "text", required: true }
          - { name: "reproductive_status", type: "text", required: false }
          - { name: "allergies", type: "json", required: false }
          - { name: "chronic_conditions", type: "json", required: false }
          - { name: "notes", type: "text", required: false }
          - { name: "is_active", type: "boolean", required: true }

      - name: "vet-owner"
        table: "module_patients_vet_owners"
        displayName: "Dueños"
        description: "Vista especializada sobre contacts para dueños de mascotas"

    views:
      - id: "patients.list.open"
        title: "Pacientes"
        type: "list"
        entity: "pet"
        acceptsContributions: true
        slots: ["sections", "actions"]

      - id: "patients.detail.open"
        title: "Ficha Paciente"
        type: "detail"
        entity: "pet"
        acceptsContributions: true
        slots: ["sections", "actions"]

      - id: "patients.create.open"
        title: "Nuevo Paciente"
        type: "form"
        entity: "pet"
        acceptsContributions: true
        slots: ["sections", "actions"]

      - id: "patients.owners.open"
        title: "Dueños"
        type: "list"
        entity: "vet-owner"
        acceptsContributions: true
        slots: ["sections", "actions"]

      - id: "patients.owner-detail.open"
        title: "Ficha Dueño"
        type: "detail"
        entity: "vet-owner"
        acceptsContributions: true
        slots: ["sections", "actions"]

    repositories:
      - prefix: "patients.pets"
        entity: "pet"
        methods: ["list", "getById", "create", "update", "delete"]
      - prefix: "patients.owners"
        entity: "vet-owner"
        methods: ["list", "getById", "create", "update", "delete"]

    dependencies:
      - "@coongro/contacts"

    settings:
      - key: "patients.species.dog"
        type: "boolean"
        label: "Perro"
        default: true
      - key: "patients.species.cat"
        type: "boolean"
        label: "Gato"
        default: true
      - key: "patients.species.bird"
        type: "boolean"
        label: "Ave"
        default: false
      - key: "patients.species.reptile"
        type: "boolean"
        label: "Reptil"
        default: false
      - key: "patients.species.rodent"
        type: "boolean"
        label: "Roedor"
        default: false
      - key: "patients.species.other"
        type: "boolean"
        label: "Otro"
        default: true
      - key: "patients.defaults.species"
        type: "enum"
        label: "Especie por defecto"
        default: "dog"
        options: ["dog", "cat", "bird", "reptile", "rodent", "other"]
      - key: "patients.behavior.openDetailOnCreate"
        type: "boolean"
        label: "Abrir ficha al crear"
        default: true

  # ==========================================================================
  # MÓDULOS (plugins reutilizables sin UI propia)
  # ==========================================================================
  - id: "contacts"
    name: "@coongro/contacts"
    version: "0.3.0"
    repo: "Coongro/contacts"
    description: "Módulo genérico y reutilizable de gestión de contactos para Coongro"
    type: "modulo"
    color: "#6B7280"

    entities:
      - name: "contact"
        table: "module_contacts_contacts"
        displayName: "Contactos"
        fields:
          - { name: "type", type: "text", required: true }
          - { name: "name", type: "text", required: true }
          - { name: "phone", type: "text", required: false }
          - { name: "email", type: "text", required: false }
          - { name: "document_type", type: "text", required: false }
          - { name: "document_number", type: "text", required: false }
          - { name: "address", type: "text", required: false }
          - { name: "notes", type: "text", required: false }
          - { name: "avatar_url", type: "text", required: false }
          - { name: "tags", type: "json", required: false }
          - { name: "is_active", type: "boolean", required: true }

    views: []

    repositories:
      - prefix: "contacts"
        entity: "contact"
        methods: ["list", "getById", "create", "update", "delete"]

    dependencies: []

    settings: []

    exports:
      hooks: ["useContacts", "useContact"]
      components: ["ContactPicker", "ContactCard"]
      types: ["Contact", "ContactType"]

  - id: "products"
    name: "@coongro/products"
    version: "0.1.0"
    repo: "Coongro/products"
    description: "Módulo genérico de productos: catálogo, categorías, variantes e inventario. Reutilizable por cualquier kit."
    type: "modulo"
    color: "#F59E0B"

    entities:
      - name: "category"
        table: "module_products_categories"
        displayName: "Categorías"

      - name: "product"
        table: "module_products_products"
        displayName: "Productos"
        fields:
          - { name: "name", type: "text", required: true }
          - { name: "description", type: "text", required: false }
          - { name: "category_id", type: "uuid", required: false, refEntity: "products.category" }
          - { name: "sku", type: "text", required: false }
          - { name: "barcode", type: "text", required: false }
          - { name: "unit", type: "text", required: false }
          - { name: "purchase_price", type: "number", required: false }
          - { name: "sale_price", type: "number", required: false }
          - { name: "tax_rate", type: "number", required: false }
          - { name: "stock_current", type: "number", required: true, default: 0 }
          - { name: "stock_minimum", type: "number", required: true, default: 0 }
          - { name: "image_url", type: "text", required: false }
          - { name: "is_active", type: "boolean", required: true, default: true }

      - name: "variant"
        table: "module_products_variants"
        displayName: "Variantes"

      - name: "stock-movement"
        table: "module_products_stock_movements"
        displayName: "Movimientos de Stock"

    views: []

    repositories:
      - prefix: "products.categories"
        entity: "category"
        methods: ["list", "getById", "create", "update", "delete"]
      - prefix: "products.items"
        entity: "product"
        methods: ["list", "getById", "create", "update", "delete"]
      - prefix: "products.variants"
        entity: "variant"
        methods: ["list", "getById", "create", "update", "delete"]
      - prefix: "products.stock"
        entity: "stock-movement"
        methods: ["list", "getById", "create", "update", "delete"]

    dependencies: []

    settings: []

    exports:
      hooks: ["useProducts", "useProduct", "useCategories"]
      components: ["ProductPicker", "ProductCard", "StockIndicator"]
      types: ["Product", "Category", "Variant", "StockMovement"]
