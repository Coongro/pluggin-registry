# Lista de repositorios de plugins a escanear
# El script regenerate-all.js lee este archivo para actualizar el catálogo completo

repos:
  # Kits
  - repo: "Coongro/kit-veterinary"
    type: "kit"

  # Bloques (plugins con UI completa)
  - repo: "Coongro/consultations"
    type: "bloque"

  - repo: "Coongro/patients"
    type: "bloque"

  # Módulos (plugins reutilizables sin UI propia)
  - repo: "Coongro/contacts"
    type: "modulo"

  - repo: "Coongro/products"
    type: "modulo"
